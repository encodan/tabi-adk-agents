# Committed numeric baseline for the legacy golden harness. The runtime reads
# only `calibration.passed` (see config._calibration_passed); the rest is an
# illustrative snapshot of a captured baseline run.
golden_set_sha: 102d9adeae7484cb
metrics:
  B_route: 0.7746
  B_factuality: 0.0
  B_trajectory: 0.7333
  B_safety: 0.3214
  B_query_plan: 0.8
  B_multi_turn: 0.4
  # Populated by --update-baseline once judge hold-out alignment is reached;
  # provisional (warning-only) until `judge.alignment.passed` flips to true.
  B_judge_pass_rate: null
  B_chart_intent_pass_rate: null
latency:
  p50_ms: 7530
  p95_ms: 26475
cost:
  usd_per_turn: 0.0
calibration:
  passed: false
  reason: 'confidence not emitted at capture time'
  bins: []
tool_mode: live
judge:
  enabled: true
  # Illustrative — the live value is the resolved TABI_FLASH_MODEL snapshot at
  # --update-baseline time, kept in sync with the CI workflow env so a fresh run
  # doesn't trip the soft model-mismatch warning. MUST be a Flash-family model.
  model: gemini-3-flash-preview
  prompt_version: v1
  few_shot_count: 4
  alignment:
    # Set true by --update-baseline once the directional hold-out gate is met
    # (≤1 misclassification per class on the 12-example hold-out).
    passed: false
    pass_class:
      misclassified: null
      total: null
    fail_class:
      misclassified: null
      total: null
    aligned_at: null
    expert_id: null
  cost:
    # Alert if exceeded. Tunable as Flash pricing changes — don't bake
    # $/call numbers into source code.
    nightly_ceiling_usd: 2.50
    pr_spotcheck_ceiling_usd: 0.30
chart_intent_judge:
  # Separate judge from `judge:` above — shares the genai client but has its own
  # prompt, fixture, and alignment gate.
  enabled: true
  model: gemini-3-flash-preview
  prompt_version: v1
  alignment:
    passed: false
    pass_class:
      misclassified: null
      total: null
    fail_class:
      misclassified: null
      total: null
    aligned_at: null
    expert_id: null
  cost:
    nightly_ceiling_usd: 0.75
    pr_spotcheck_ceiling_usd: 0.10
