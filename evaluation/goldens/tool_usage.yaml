# Golden dataset: Tool usage correctness examples
# Tests that agents call the correct tools with the right parameters.

- id: tool-pipeline-bottleneck-001
  category: tool_usage
  difficulty: easy
  question: "Where are our pipeline bottlenecks?"
  expected_agent: pipeline_analyst
  expected_sub_intent: bottleneck
  expected_tools: [query_multiple_recruitment_metrics]
  expected_metrics: [avg_days_in_stage, total_applications]

