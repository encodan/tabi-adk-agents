- id: fact-pipeline-velocity-001
  category: factuality
  difficulty: medium
  question: "How many hires are we making per month?"
  expected_agent: capacity_planner
  expected_metrics: [hired_count]
  # `capacity_planner/velocity` deterministic plan emits 3 queries
  # (hired_count, total_applications, time_to_hire). Provide rows for all
  # three so the agent doesn't hallucinate when 2 of 3 queries return
  # empty — see the capacity_planner velocity query plan.
  mock_query_results:
    - metric: hired_count
      value: 15.7
      dimensions: {}
    - metric: total_applications
      value: 250
      dimensions: {}
    - metric: time_to_hire
      value: 28.5
      dimensions: {}
  expected_numbers:
    hired_count: 15.7
  must_contain: ["15.7"]

