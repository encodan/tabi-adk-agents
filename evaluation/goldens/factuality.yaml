- id: fact-stage-dropoff-001
  category: factuality
  difficulty: hard
  # stage_dropout_rate was retired — it
  # bundled stalled (still active) with rejected (terminal exit). For "where
  # are we losing candidates", stage_rejection_rate is the defensible
  # terminal-exit signal per stage.
  question: "Where are we losing the most candidates?"
  expected_agent: pipeline_analyst
  # "Losing candidates" = terminal exit (rejected) + aged-out (stalled).
  # stage_dropout_rate used to bundle both — but it conflated the two
  # signals. Now they're distinct: rejection = explicit no, stall = silent
  # ghosting. Both belong in this answer.
  expected_metrics: [stage_rejection_rate, stage_stall_rate]
  mock_query_results:
    - metric: stage_rejection_rate
      value: 28.5
      dimensions:
        stage_name: "Phone Screen"
    - metric: stage_rejection_rate
      value: 22.1
      dimensions:
        stage_name: "Technical Interview"
    - metric: stage_rejection_rate
      value: 5.5
      dimensions:
        stage_name: "Onsite"
    - metric: stage_stall_rate
      value: 16.7
      dimensions:
        stage_name: "Phone Screen"
    - metric: stage_stall_rate
      value: 10.0
      dimensions:
        stage_name: "Technical Interview"
    - metric: stage_stall_rate
      value: 3.0
      dimensions:
        stage_name: "Onsite"
  expected_numbers:
    rejection_phone_screen: 28.5
    rejection_technical: 22.1
    rejection_onsite: 5.5
    stall_phone_screen: 16.7
    stall_technical: 10.0
    stall_onsite: 3.0
  must_contain: ["28.5", "16.7"]

