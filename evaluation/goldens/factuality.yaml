- id: fact-offer-pending-001
  category: factuality
  difficulty: easy
  question: "How many offers are currently pending?"
  expected_agent: offer_advisor
  # Class B widening: the planner can answer this with
  # either the dedicated `pending_offers` derived metric or `total_offers`
  # filtered by offer stage — both defensibly correct. Either set passes.
  acceptable_metric_sets:
    - [pending_offers]
    - [total_offers]
  mock_query_results:
    - metric: pending_offers
      value: 9
      dimensions: {}
    - metric: total_offers
      value: 9
      dimensions: {offer_status: "Created"}
  expected_numbers:
    pending_offers: 9
    total_offers: 9
  must_contain: ["9"]
