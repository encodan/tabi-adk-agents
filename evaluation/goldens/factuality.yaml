# Golden dataset: Factuality (number accuracy) examples
# Tests that agent responses contain correct numbers from query results.

- id: fact-hire-rate-001
  category: factuality
  difficulty: medium
  question: "What's our current hire rate?"
  expected_agent: general_analyst
  expected_metrics: [hire_rate]
  mock_query_results:
    - metric: hire_rate
      value: 12.3
      dimensions: {}
  expected_numbers:
    hire_rate: 12.3
  must_contain: ["12.3%"]

