# --- Edge case: ambiguous routing ---
# Replaces a redundant capacity_planner.forecast example. "Interview performance"
# could be interviewing_coach (efficiency/stage_optimization) or pipeline_analyst
# (stage-by-stage metrics). Either route is acceptable; we only assert the
# router committed to a specialist rather than dropping to coordinator.

- id: route-edge-ambiguous-001
  category: routing
  difficulty: hard
  question: "Show me interview performance"
  acceptable_agents:
    - interviewing_coach
    - pipeline_analyst
  # Either specialist is a defensible route for this query — we assert only
  # that the classifier commits to one of them rather than dropping to the
  # coordinator. Verifies deterministic disambiguation.

- id: route-capacity-coverage-001
  category: routing
  difficulty: easy
  question: "Is our candidate pipeline deep enough for next quarter?"
  expected_agent: capacity_planner
  expected_sub_intent: coverage

- id: route-capacity-coverage-002
  category: routing
  difficulty: medium
  question: "Should we bring on additional recruiters?"
  expected_agent: capacity_planner
  expected_sub_intent: coverage

