# Golden dataset: Route correctness examples
# Tests that the semantic router selects the correct agent and sub-intent.
# These questions are held out from any router few-shot/training utterances.

# --- pipeline_analyst ---

- id: route-pipeline-bottleneck-001
  category: routing
  difficulty: easy
  question: "Where are our pipeline bottlenecks?"
  expected_agent: pipeline_analyst
  expected_sub_intent: bottleneck

- id: route-pipeline-bottleneck-002
  category: routing
  difficulty: medium
  question: "Why is Engineering hiring so slow?"
  expected_agent: pipeline_analyst
  expected_sub_intent: bottleneck

- id: route-pipeline-bottleneck-003
  category: routing
  difficulty: hard
  question: "We're losing candidates midway through — what's going on?"
  expected_agent: pipeline_analyst
  expected_sub_intent: stage_analysis

- id: route-pipeline-stage-001
  category: routing
  difficulty: easy
  question: "What's the conversion rate at each hiring stage?"
  expected_agent: pipeline_analyst
  expected_sub_intent: stage_analysis

- id: route-pipeline-health-001
  category: routing
  difficulty: medium
  question: "Give me a pipeline health check for the Sales team"
  expected_agent: pipeline_analyst
  expected_sub_intent: pipeline_health

