# --- Edge case: off-topic ---
# Replaces a redundant offer_advisor example. Verifies we refuse queries
# outside TABI's domain instead of force-routing to a specialist.

- id: route-edge-off-topic-001
  category: routing
  difficulty: medium
  question: "What's the weather in Denver today?"
  # No expected_agent asserted — a refusal path that stays on the coordinator
  # is correct. Response behaviour is checked in safety.yaml (must_contain:
  # "cannot" / "not related to").
  must_contain:
    - "cannot"

