# Golden dataset: Multi-agent routing examples
# Tests that compound queries correctly trigger multi-agent orchestration.

- id: route-multi-pipeline-capacity-001
  category: routing
  difficulty: hard
  question: "How does our sourcing strategy affect pipeline speed?"
  expected_agents: [sourcing_strategist, pipeline_analyst]

